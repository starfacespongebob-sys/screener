# Optional nginx reverse proxy for Hostinger VPS (port 80/443 -> Node 8080)
# Place in /etc/nginx/sites-available/remote-support and symlink to sites-enabled.

# HTTP -> HTTPS redirect (use after certbot)
server {
    listen 80;
    server_name remotesharing.space www.remotesharing.space 147.93.85.173;
    return 301 https://remotesharing.space$request_uri;
}

server {
    listen 443 ssl http2;
    server_name remotesharing.space www.remotesharing.space;

    # Certbot places certs here (adjust if your paths differ):
    ssl_certificate     /etc/letsencrypt/live/remotesharing.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/remotesharing.space/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

# Direct IP access on port 8080 is still served by Node (systemd).